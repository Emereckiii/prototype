<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransPoints — Jeepney QR Codes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --red: #E8292A; --gold: #F5B800; --blue: #3A9BDC; --dark: #0E0F12; }

  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; color: #111; padding: 24px 16px; }

  .page-header { text-align: center; margin-bottom: 32px; }
  .page-header h1 { font-size: 28px; font-weight: 800; letter-spacing: 1px; color: var(--dark); }
  .page-header p { font-size: 13px; color: #666; margin-top: 6px; }
  .app-badge { display: inline-block; background: var(--red); color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; padding: 4px 14px; border-radius: 20px; margin-top: 10px; text-transform: uppercase; }

  .print-bar { display: flex; justify-content: center; margin-bottom: 28px; }
  .print-btn { background: var(--dark); color: #fff; border: none; border-radius: 10px; padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px; }
  .print-btn:hover { background: #222; }

  .class-section { margin-bottom: 28px; }
  .class-label { font-size: 11px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 8px; }
  .class-label.cls1 { background: rgba(61,190,122,0.15); color: #1a7a4a; border: 1px solid rgba(61,190,122,0.3); }
  .class-label.cls2 { background: rgba(245,184,0,0.15);  color: #8a6500; border: 1px solid rgba(245,184,0,0.3); }

  .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }

  .qr-card { background: #fff; border-radius: 14px; padding: 16px 14px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; gap: 10px; page-break-inside: avoid; }
  .qr-card.modern { border: 2px solid var(--blue); }
  .qr-card.regular { border: 2px solid #e0e0e0; }

  .card-top-bar { width: 100%; background: var(--dark); border-radius: 6px; padding: 5px 10px; display: flex; align-items: center; justify-content: space-between; }
  .card-app-name { font-size: 10px; font-weight: 800; letter-spacing: 2px; color: #fff; text-transform: uppercase; }
  .card-app-icon { font-size: 14px; }

  .qr-box { width: 152px; height: 152px; background: #fff; display: flex; align-items: center; justify-content: center; border: 1px solid #eee; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .qr-box canvas, .qr-box img { width: 148px !important; height: 148px !important; }

  .card-route-name { font-size: 12px; font-weight: 700; text-align: center; line-height: 1.3; color: #111; }
  .card-badges { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 6px; }
  .badge-fare   { background: #f5f5f5; color: #333; border: 1px solid #ddd; }
  .badge-pts    { background: rgba(245,184,0,0.15); color: #8a6500; border: 1px solid rgba(245,184,0,0.3); }
  .badge-modern { background: rgba(58,155,220,0.12); color: #1a5f99; border: 1px solid rgba(58,155,220,0.3); }

  .scan-instruction { width: 100%; background: #f8f8f8; border-radius: 6px; padding: 5px 8px; font-size: 9px; color: #888; text-align: center; border: 1px dashed #ddd; letter-spacing: 0.3px; }

  .spinner { width: 24px; height: 24px; border: 2px solid #eee; border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media print {
    body { background: #fff; padding: 12px; }
    .print-bar { display: none !important; }
    .qr-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .qr-card { box-shadow: none; padding: 12px 10px 10px; }
    .page-header { margin-bottom: 20px; }
    .class-section { margin-bottom: 20px; }
    .qr-box { width: 128px; height: 128px; }
    .qr-box canvas, .qr-box img { width: 124px !important; height: 124px !important; }
    @page { margin: 1cm; size: A4; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>🚌 TransPoints QR Codes</h1>
  <p>Display these inside the jeepney for passengers to scan and earn points</p>
  <span class="app-badge">Official TransPoints App</span>
</div>

<div class="print-bar">
  <button class="print-btn" onclick="window.print()">🖨️ Print All QR Codes</button>
</div>

<div id="qrContainer"></div>

<script>
  const ROUTES = [
    { name: 'Trancoville Jeep',              barangay: 'Trancoville',           fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'Trancoville Modern Jeep',       barangay: 'Trancoville',           fare: 15, pts: 7,  cls: 1, type: 'modern'  },
    { name: 'Mines View Jeep',               barangay: 'Mines View',            fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'Mines View Modern Jeep',        barangay: 'Mines View',            fare: 15, pts: 7,  cls: 1, type: 'modern'  },
    { name: 'Aurora Hill Jeep',              barangay: 'Aurora Hill',           fare: 15, pts: 8,  cls: 1, type: 'regular' },
    { name: 'Aurora Hill Modern Jeep',       barangay: 'Aurora Hill',           fare: 17, pts: 9,  cls: 1, type: 'modern'  },
    { name: 'Campo Sioco Jeep',              barangay: 'Campo Sioco',           fare: 14, pts: 6,  cls: 1, type: 'regular' },
    { name: 'Campo Sioco Modern Jeep',       barangay: 'Campo Sioco',           fare: 17, pts: 9,  cls: 1, type: 'modern'  },
    { name: 'Pacdal Jeep',                   barangay: 'Pacdal',                fare: 14, pts: 6,  cls: 1, type: 'regular' },
    { name: 'Pacdal Modern Jeep',            barangay: 'Pacdal',                fare: 17, pts: 9,  cls: 1, type: 'modern'  },
    { name: 'San Vicente/Poliwes Jeep',      barangay: 'San Vicente · Poliwes', fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'San Vicente/Poliwes Modern',    barangay: 'San Vicente · Poliwes', fare: 15, pts: 7,  cls: 1, type: 'modern'  },
    { name: 'Camp 7 Jeep',                   barangay: 'Camp 7',                fare: 15, pts: 8,  cls: 1, type: 'regular' },
    { name: 'Tam-Awan Village Jeep',         barangay: 'Tam-Awan Village',      fare: 15, pts: 8,  cls: 1, type: 'regular' },
    { name: 'Bakakeng Norte/Sur Jeep',       barangay: 'Bakakeng Norte/Sur',    fare: 15, pts: 8,  cls: 1, type: 'regular' },
    { name: 'Guisad Jeep',                   barangay: 'Guisad',                fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'Brookside Jeep',                barangay: 'Brookside',             fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'Apugan Jeep',                   barangay: 'Apugan',                fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'Navy Base Jeep',                barangay: 'Navy Base',             fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'Holy Ghost Jeep',               barangay: 'Holy Ghost',            fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'City Camp Jeep',                barangay: 'City Camp',             fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'Dagsian Jeep',                  barangay: 'Dagsian',               fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'Crystal Cave Jeep',             barangay: 'Crystal Cave',          fare: 13, pts: 5,  cls: 1, type: 'regular' },
    { name: 'Loakan Jeep',                   barangay: 'Loakan',                fare: 18, pts: 9,  cls: 2, type: 'regular' },
    { name: 'Loakan Modern Jeep',            barangay: 'Loakan',                fare: 20, pts: 10, cls: 2, type: 'modern'  },
    { name: 'Kias Jeep',                     barangay: 'Kias',                  fare: 22, pts: 11, cls: 2, type: 'regular' },
    { name: 'Kias Modern Jeep',              barangay: 'Kias',                  fare: 26, pts: 13, cls: 2, type: 'modern'  },
    { name: 'Asin Road Jeep',                barangay: 'Asin Road',             fare: 25, pts: 12, cls: 2, type: 'regular' },
  ];

  const QR_PREFIX = 'TRANS|';
  const SECTIONS  = [
    { cls: 1, label: '🟢 Class 1 — Near Barangays (₱13–₱17)', cssClass: 'cls1' },
    { cls: 2, label: '🟡 Class 2 — Far Barangays (₱18–₱26)',  cssClass: 'cls2' },
  ];

  const container = document.getElementById('qrContainer');
  const qrJobs    = [];

  SECTIONS.forEach(section => {
    const routes = ROUTES.filter(r => r.cls === section.cls);
    if (!routes.length) return;

    const sec  = document.createElement('div');
    sec.className = 'class-section';
    sec.innerHTML = `<div class="class-label ${section.cssClass}">${section.label}</div>`;

    const grid = document.createElement('div');
    grid.className = 'qr-grid';

    routes.forEach(r => {
      const isModern = r.type === 'modern';
      const qrId     = 'qr_' + r.name.replace(/[^a-z0-9]/gi, '_');

      const card = document.createElement('div');
      card.className = `qr-card ${isModern ? 'modern' : 'regular'}`;
      card.innerHTML = `
        <div class="card-top-bar">
          <span class="card-app-name">TransPoints</span>
          <span class="card-app-icon">${isModern ? '🚐' : '🚌'}</span>
        </div>
        <div class="qr-box" id="${qrId}"><div class="spinner"></div></div>
        <div class="card-route-name">${r.name}</div>
        <div class="card-badges">
          <span class="badge badge-fare">₱${r.fare} fare</span>
          <span class="badge badge-pts">+${r.pts} pts</span>
          ${isModern ? '<span class="badge badge-modern">MODERN</span>' : ''}
        </div>
        <div class="scan-instruction">Scan with TransPoints App</div>
      `;

      grid.appendChild(card);
      qrJobs.push({ id: qrId, text: QR_PREFIX + r.name });
    });

    sec.appendChild(grid);
    container.appendChild(sec);
  });

  // Generate QR codes with slight stagger to keep UI responsive
  qrJobs.forEach((job, i) => {
    setTimeout(() => {
      const el = document.getElementById(job.id);
      if (!el) return;
      el.innerHTML = '';
      new QRCode(el, {
        text: job.text,
        width: 148, height: 148,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    }, i * 40);
  });
</script>
</body>
</html>
